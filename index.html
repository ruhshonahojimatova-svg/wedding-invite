<script>
        // --- КОНФИГУРАЦИЯ TELEGRAM ---
        const TELEGRAM_BOT_TOKEN = '8556775064:AAEzpPRZOiWtKlgTauNIEkYQ6E9vYDFKv6Q';
        const TELEGRAM_CHAT_ID = '1391803164';

        // --- ЛОГИКА ОТПРАВКИ В TELEGRAM ---
        document.getElementById('rsvp-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('guest-name').value;
            const attendance = document.querySelector('input[name="attendance"]:checked').value;
            const music = document.getElementById('guest-music').value;

            const text = `Новый ответ на приглашение:\n\nИмя: ${name}\nСтатус: ${attendance}\nПесня: ${music || 'Не указано'}`;

            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text
                })
            })
            .then(response => {
                if (response.ok) {
                    alert('Спасибо! Ваш ответ успешно отправлен.');
                    document.getElementById('rsvp-form').reset();
                } else {
                    alert('Произошла ошибка при отправке. Попробуйте еще раз.');
                }
            })
            .catch(error => alert('Ошибка соединения: ' + error));
        });

        // --- ОСТАЛЬНАЯ ЛОГИКА (Конверт, Музыка, Анимации) ---
        const envelopeScreen = document.getElementById('envelope-screen');
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');

        function openEnvelope() {
            document.body.classList.add('envelope-opened');
            envelopeScreen.classList.add('opened');
            music.play().catch(e => console.log("Музыка ожидает взаимодействия пользователя"));
            musicBtn.style.display = 'flex';
        }

        musicBtn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                musicBtn.classList.add('playing');
                musicBtn.innerText = '🔊';
            } else {
                music.pause();
                musicBtn.classList.remove('playing');
                musicBtn.innerText = '🔇';
            }
        });

        // Анимация появления элементов
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        });
        document.querySelectorAll('.fade-in-section').forEach(s => observer.observe(s));

        // Таймер обратного отсчета
        function updateTimer() {
            const weddingDate = new Date('August 6, 2026 17:00:00').getTime();
            const now = new Date().getTime();
            const diff = weddingDate - now;

            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
